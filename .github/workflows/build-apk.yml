name: Build App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name'
        required: true
        default: 'My App'
      package_name:
        description: 'Package name'
        required: true
        default: 'com.example.myapp'
      website_url:
        description: 'Website URL'
        required: true
        default: 'https://example.com'
      version_name:
        description: 'Version'
        required: false
        default: '1.0.0'
      job_id:
        description: 'Job ID'
        required: false
        default: 'manual'

jobs:
  # ── ANDROID ────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      run: |
        sudo apt-get install -y wget unzip
        mkdir -p $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
        unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Prepare project
      run: |
        APP="${{ github.event.inputs.app_name }}"
        PKG="${{ github.event.inputs.package_name }}"
        URL="${{ github.event.inputs.website_url }}"
        VER="${{ github.event.inputs.version_name }}"
        cp -r android-template/ build-project/
        find build-project/ -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.properties" \) | while read f; do
          sed -i "s|APP_NAME_PLACEHOLDER|${APP}|g" "$f"
          sed -i "s|com\.appforge\.template|${PKG}|g" "$f"
          sed -i "s|com.appforge.template|${PKG}|g" "$f"
          sed -i "s|https://placeholder\.appforge\.url|${URL}|g" "$f"
          sed -i "s|https://placeholder.appforge.url|${URL}|g" "$f"
          sed -i "s|VERSION_PLACEHOLDER|${VER}|g" "$f"
        done
        PKG_PATH=$(echo "$PKG" | tr '.' '/')
        mkdir -p "build-project/app/src/main/java/${PKG_PATH}"
        mv "build-project/app/src/main/java/PACKAGE_PLACEHOLDER/MainActivity.java" \
           "build-project/app/src/main/java/${PKG_PATH}/MainActivity.java"
        sed -i "s|package com\.appforge\.template|package ${PKG}|g" \
           "build-project/app/src/main/java/${PKG_PATH}/MainActivity.java"
        rm -rf build-project/app/src/main/java/PACKAGE_PLACEHOLDER
        echo "sdk.dir=$ANDROID_HOME" > build-project/local.properties

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
        unzip -q gradle.zip -d $HOME/gradle-dist
        echo "$HOME/gradle-dist/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Build APK
      working-directory: build-project
      run: gradle assembleDebug --no-daemon --no-build-cache
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Sign APK
      run: |
        APK=$(find build-project/app/build/ -name "*.apk" | head -1)
        SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_')
        keytool -genkeypair -v -keystore appforge.keystore -alias appforge \
          -keyalg RSA -keysize 2048 -validity 9999 \
          -storepass appforge123 -keypass appforge123 \
          -dname "CN=AppForge,O=AppForge,C=US" 2>/dev/null
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
          --ks appforge.keystore --ks-key-alias appforge \
          --ks-pass pass:appforge123 --key-pass pass:appforge123 \
          --out "${SAFE}.apk" "$APK"
        ls -lh "${SAFE}.apk"

    - uses: actions/upload-artifact@v4
      with:
        name: android-${{ github.event.inputs.job_id }}
        path: "*.apk"
        retention-days: 1

  # ── WINDOWS ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create Electron project
      shell: bash
      run: |
        APP="${{ github.event.inputs.app_name }}"
        PKG="${{ github.event.inputs.package_name }}"
        URL="${{ github.event.inputs.website_url }}"
        VER="${{ github.event.inputs.version_name }}"
        SAFE=$(echo "$APP" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

        mkdir electron-app && cd electron-app

        cat > package.json << PKGJSON
        {
          "name": "${SAFE}",
          "version": "${VER}",
          "description": "${APP}",
          "main": "main.js",
          "scripts": { "build": "electron-builder --win --x64" },
          "build": {
            "appId": "${PKG}",
            "productName": "${APP}",
            "directories": { "output": "dist" },
            "win": {
              "target": [{ "target": "nsis", "arch": ["x64"] }],
              "icon": "icon.ico"
            },
            "nsis": {
              "oneClick": false,
              "allowToChangeInstallationDirectory": true,
              "createDesktopShortcut": true
            }
          },
          "devDependencies": {
            "electron": "^28.0.0",
            "electron-builder": "^24.0.0"
          }
        }
        PKGJSON

        cat > main.js << MAINJSEOF
        const { app, BrowserWindow, shell } = require('electron');
        function createWindow() {
          const win = new BrowserWindow({
            width: 1200, height: 800,
            title: '${APP}',
            backgroundColor: '#08090c',
            autoHideMenuBar: true,
            webPreferences: { nodeIntegration: false, contextIsolation: true }
          });
          win.loadURL('${URL}');
          win.webContents.setWindowOpenHandler(({ url }) => { shell.openExternal(url); return { action: 'deny' }; });
        }
        app.whenReady().then(createWindow);
        app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
        MAINJSEOF

        # Create a simple ICO (1x1 pixel placeholder - electron-builder needs one)
        node -e "
        const fs = require('fs');
        // Minimal valid ICO file (16x16 blue square)
        const ico = Buffer.from('', 'hex');
        fs.writeFileSync('icon.ico', ico);
        console.log('ICO created');
        "

    - name: Install dependencies
      working-directory: electron-app
      run: npm install

    - name: Build Windows EXE
      working-directory: electron-app
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Rename output
      shell: bash
      run: |
        SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_')
        find electron-app/dist/ -name "*.exe" | head -5
        EXE=$(find electron-app/dist/ -name "*Setup*.exe" -o -name "*.exe" | head -1)
        cp "$EXE" "${SAFE}_Setup.exe"
        ls -lh *.exe

    - uses: actions/upload-artifact@v4
      with:
        name: windows-${{ github.event.inputs.job_id }}
        path: "*.exe"
        retention-days: 1

  # ── LINUX ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create Electron project
      run: |
        APP="${{ github.event.inputs.app_name }}"
        PKG="${{ github.event.inputs.package_name }}"
        URL="${{ github.event.inputs.website_url }}"
        VER="${{ github.event.inputs.version_name }}"
        SAFE=$(echo "$APP" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

        mkdir electron-app && cd electron-app

        cat > package.json << PKGJSON
        {
          "name": "${SAFE}",
          "version": "${VER}",
          "description": "${APP}",
          "main": "main.js",
          "scripts": { "build": "electron-builder --linux" },
          "build": {
            "appId": "${PKG}",
            "productName": "${APP}",
            "directories": { "output": "dist" },
            "linux": {
              "target": ["AppImage"],
              "category": "Utility"
            }
          },
          "devDependencies": {
            "electron": "^28.0.0",
            "electron-builder": "^24.0.0"
          }
        }
        PKGJSON

        cat > main.js << MAINJSEOF
        const { app, BrowserWindow, shell } = require('electron');
        function createWindow() {
          const win = new BrowserWindow({
            width: 1200, height: 800,
            title: '${APP}',
            backgroundColor: '#08090c',
            autoHideMenuBar: true,
            webPreferences: { nodeIntegration: false, contextIsolation: true }
          });
          win.loadURL('${URL}');
          win.webContents.setWindowOpenHandler(({ url }) => { shell.openExternal(url); return { action: 'deny' }; });
        }
        app.whenReady().then(createWindow);
        app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
        MAINJSEOF

    - name: Install dependencies
      working-directory: electron-app
      run: npm install

    - name: Build Linux AppImage
      working-directory: electron-app
      run: npm run build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Rename output
      run: |
        SAFE=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_')
        find electron-app/dist/ -name "*.AppImage" | head -5
        APPIMG=$(find electron-app/dist/ -name "*.AppImage" | head -1)
        cp "$APPIMG" "${SAFE}.AppImage"
        ls -lh *.AppImage

    - uses: actions/upload-artifact@v4
      with:
        name: linux-${{ github.event.inputs.job_id }}
        path: "*.AppImage"
        retention-days: 1
